<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Drum Kit</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>


  <div class="keys">
    <div data-key="65" class="key">
      <kbd>A</kbd>
      <span class="sound">clap</span>
    </div>
    <div data-key="83" class="key">
      <kbd>S</kbd>
      <span class="sound">hihat</span>
    </div>
    <div data-key="68" class="key">
      <kbd>D</kbd>
      <span class="sound">kick</span>
    </div>
    <div data-key="70" class="key">
      <kbd>F</kbd>
      <span class="sound">openhat</span>
    </div>
    <div data-key="71" class="key">
      <kbd>G</kbd>
      <span class="sound">boom</span>
    </div>
    <div data-key="72" class="key">
      <kbd>H</kbd>
      <span class="sound">ride</span>
    </div>
    <div data-key="74" class="key">
      <kbd>J</kbd>
      <span class="sound">snare</span>
    </div>
    <div data-key="75" class="key">
      <kbd>K</kbd>
      <span class="sound">tom</span>
    </div>
    <div data-key="76" class="key">
      <kbd>L</kbd>
      <span class="sound">tink</span>
    </div>
  </div>

  <audio data-key="65" src="sounds/clap.wav"></audio>
  <audio data-key="83" src="sounds/hihat.wav"></audio>
  <audio data-key="68" src="sounds/kick.wav"></audio>
  <audio data-key="70" src="sounds/openhat.wav"></audio>
  <audio data-key="71" src="sounds/boom.wav"></audio>
  <audio data-key="72" src="sounds/ride.wav"></audio>
  <audio data-key="74" src="sounds/snare.wav"></audio>
  <audio data-key="75" src="sounds/tom.wav"></audio>
  <audio data-key="76" src="sounds/tink.wav"></audio>

<script>
  window.addEventListener('keydown', playSound);
  function playSound(e) {
    console.log(e.keyCode);
    const audio = document.querySelector(`audio[data-key="${e.keyCode}"]`);
    const key = document.querySelector(`.key[data-key="${e.keyCode}"]`);
    if(!audio) return;
    console.log(audio, key);
    audio.currentTime = 0;
    audio.play();
    key.classList.add('playing');
    const keys = document.querySelectorAll('.key');
    keys.forEach(key => key.addEventListener('transitionend', removeTransition));
  }

  function removeTransition(e) {
    if (e.propertyName !== 'transform') return;
    e.target.classList.remove('playing');
  }
</script>


</body>
</html>

<!-- Drum Kit - Step by Step Instructions
Step 1 — Listen for a keypress
Add an event listener on the window object that listens for the keydown event
When fired, it should call a function (e.g. playSound)
Step 2 — Create the playSound function
The function receives the event e as a parameter. Inside it you need to:

Use document.querySelector to find the <audio> element whose data-key attribute matches e.keyCode
Use document.querySelector to find the .key div whose data-key attribute matches e.keyCode
If no audio element is found, stop the function (to handle keys that have no sound)
Reset the audio's currentTime to 0 so rapid presses replay from the start
Call .play() on the audio element
Add the CSS class playing to the key div
Step 3 — Remove the animation after it finishes
Select all .key elements as an array
Loop through them and add a transitionend event listener to each
In that listener's function:
Check if e.propertyName is "transform" — if not, ignore it
Remove the playing class from e.target
💡 Hint: To select an element by a data attribute use: [data-key="value"] inside your querySelector string — and the value will come from e.keyCode -->
